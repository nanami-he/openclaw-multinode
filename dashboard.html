<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>openclaw-multinode 状态看板</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f14; color: #e0e0e8; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 24px; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
h1 { font-size: 18px; font-weight: 600; color: #fff; }
.time { font-size: 12px; color: #555; }
.refresh-btn { background: #1e1e2a; border: 1px solid #2a2a3a; color: #888; font-size: 12px; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
.refresh-btn:hover { border-color: #444; color: #aaa; }
.nodes { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
.node { background: #18181f; border: 1px solid #252530; border-radius: 12px; padding: 18px; }
.node-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.node-name { font-size: 14px; font-weight: 600; color: #fff; }
.node-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
.badge-ch { background: #2d1f4e; color: #a78bfa; }
.badge-pm { background: #1a2d4e; color: #60a5fa; }
.node-status { font-size: 12px; color: #555; margin-bottom: 14px; }
.dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
.dot-on { background: #22c55e; }
.dot-off { background: #ef4444; }
.hgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.dirbox { background: #1e1e28; border-radius: 8px; padding: 10px 8px; text-align: center; }
.dir-label { font-size: 10px; color: #444; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
.dir-count { font-size: 22px; font-weight: 700; }
.c-outbox { color: #f59e0b; }
.c-inbox { color: #60a5fa; }
.c-archive { color: #22c55e; }
.section-title { font-size: 11px; font-weight: 600; color: #3a3a4a; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 12px; }
.timeline { position: relative; padding-left: 22px; }
.timeline::before { content: ''; position: absolute; left: 6px; top: 0; bottom: 0; width: 1px; background: #252530; }
.task { position: relative; margin-bottom: 10px; }
.task::before { content: ''; position: absolute; left: -18px; top: 7px; width: 8px; height: 8px; border-radius: 50%; background: #333; border: 1.5px solid #2a2a3a; }
.task-card { background: #18181f; border: 1px solid #22222e; border-radius: 8px; padding: 11px 13px; }
.task-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.task-id { font-size: 11px; font-weight: 600; color: #60a5fa; font-family: 'SF Mono', monospace; }
.badge { font-size: 9px; padding: 2px 7px; border-radius: 10px; font-weight: 500; }
.b-completed { background: #0f2015; color: #22c55e; }
.b-inbox { background: #0f1e30; color: #60a5fa; }
.b-pending { background: #2a2010; color: #f59e0b; }
.b-failed { background: #2a1010; color: #ef4444; }
.task-inst { font-size: 12px; color: #666; line-height: 1.4; }
.task-meta { font-size: 10px; color: #333; margin-top: 3px; }
.flow { display: flex; justify-content: center; align-items: center; gap: 0; margin: 20px 0; }
.fn { background: #18181f; border: 1px solid #252530; border-radius: 8px; padding: 9px 14px; text-align: center; min-width: 80px; }
.fn .emoji { font-size: 16px; }
.fn .label { font-size: 9px; color: #444; margin-top: 1px; }
.flow-arrow { color: #2a2a3a; font-size: 16px; padding: 0 6px; }
footer { text-align: center; font-size: 11px; color: #2a2a3a; margin-top: 40px; }
.error-msg { background: #1e1010; border: 1px solid #3a1515; border-radius: 8px; padding: 12px 16px; color: #ef4444; font-size: 13px; margin: 8px 0; }
.loading { text-align: center; color: #444; font-size: 13px; padding: 20px; }
</style>
</head>
<body>
<div class="container">
<header>
<div>
  <h1>🔗 openclaw-multinode 看板</h1>
  <div class="time">自动刷新 · <span id="update-time">-</span></div>
</div>
<button class="refresh-btn" onclick="loadAll()">🔄 刷新</button>
</header>

<!-- Flow -->
<div class="flow">
  <div class="fn"><div class="emoji">👑</div><div class="label">Emperor</div></div>
  <div class="flow-arrow">→</div>
  <div class="fn"><div class="emoji">🍰</div><div class="label">Chamberlain</div></div>
  <div class="flow-arrow">→</div>
  <div class="fn"><div class="emoji">📦</div><div class="label">handoff</div></div>
  <div class="flow-arrow">→</div>
  <div class="fn"><div class="emoji">⚡</div><div class="label">Prime</div></div>
  <div class="flow-arrow">↔</div>
  <div class="fn"><div class="emoji">🍰</div><div class="label">Chamberlain</div></div>
</div>

<!-- Nodes -->
<div class="nodes">
  <div class="node">
    <div class="node-header">
      <div class="node-name">🍰 Lord Chamberlain</div>
      <div><span class="node-badge badge-ch">本地 Mac</span></div>
    </div>
    <div class="node-status"><span class="dot dot-on"></span><span>本地 · 节点 A</span></div>
    <div class="hgrid">
      <div class="dirbox"><div class="dir-label">outbox</div><div class="dir-count c-outbox" id="ch-outbox">-</div></div>
      <div class="dirbox"><div class="dir-label">inbox</div><div class="dir-count c-inbox" id="ch-inbox">-</div></div>
      <div class="dirbox"><div class="dir-label">archive</div><div class="dir-count c-archive" id="ch-archive">-</div></div>
    </div>
  </div>
  <div class="node">
    <div class="node-header">
      <div class="node-name">⚡ Prime Minister</div>
      <div><span class="node-badge badge-pm">腾讯云</span></div>
    </div>
    <div class="node-status"><span class="dot dot-on"></span><span>云端 · 节点 B</span></div>
    <div class="hgrid">
      <div class="dirbox"><div class="dir-label">outbox</div><div class="dir-count c-outbox" id="pm-outbox">-</div></div>
      <div class="dirbox"><div class="dir-label">inbox</div><div class="dir-count c-inbox" id="pm-inbox">-</div></div>
      <div class="dirbox"><div class="dir-label">archive</div><div class="dir-count c-archive" id="pm-archive">-</div></div>
    </div>
  </div>
</div>

<div class="section-title">📋 任务列表</div>
<div class="loading" id="loading">加载中...</div>
<div class="timeline" id="task-list"></div>

<footer>openclaw-multinode · 多节点协作原型 · v1-prime-execution</footer>
</div>

<script>
// 自动刷新间隔（毫秒）
const REFRESH_MS = 30000;
let taskSet = new Set();

async function fetchJSON(url) {
  const r = await fetch(url, { cache: 'no-cache' });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function renderCount(id, arr) {
  document.getElementById(id).textContent = arr.length;
}

function getBadge(status) {
  const m = { completed: ['已完成', 'b-completed'], inbox: ['处理中', 'b-inbox'], pending: ['待处理', 'b-pending'], failed: ['失败', 'b-failed'] };
  const [label, cls] = m[status] || [status, 'b-pending'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function addTask(task) {
  if (taskSet.has(task.id)) return;
  taskSet.add(task.id);
  const div = document.createElement('div');
  div.className = 'task';
  div.innerHTML = `
    <div class="task-card">
      <div class="task-top">
        <span class="task-id">${task.id}</span>
        ${getBadge(task.status)}
      </div>
      <div class="task-inst">${task.inst || ''}</div>
      <div class="task-meta">${task.node} · ${task.time || ''}</div>
    </div>
  `;
  document.getElementById('task-list').prepend(div);
}

async function loadAll() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('task-list').innerHTML = '';
  taskSet.clear();
  try {
    const [ch, pm] = await Promise.all([
      fetchJSON('./status-chamberlain.json?t=' + Date.now()),
      fetchJSON('./status-prime.json?t=' + Date.now())
    ]);
    renderCount('ch-outbox', ch.outbox || []);
    renderCount('ch-inbox', ch.inbox || []);
    renderCount('ch-archive', ch.archive || []);
    renderCount('pm-outbox', pm.outbox || []);
    renderCount('pm-inbox', pm.inbox || []);
    renderCount('pm-archive', pm.archive || []);

    const allTasks = [];
    const taskInfo = {
      'task-20260324-0001': { inst: '验证双节点闭环', time: '14:47' },
      'task-20260324-0002': { inst: 'Prime 身份验证', time: '16:39' },
      'task-20260324-0004': { inst: '分析 nodeskclaw 项目', time: '19:20' }
    };

    [...(ch.outbox||[]), ...(ch.inbox||[]), ...(ch.archive||[])].forEach(t => {
      const info = taskInfo[t.id] || {};
      allTasks.push({ ...t, node: 'chamberlain', ...info });
    });
    [...(pm.outbox||[]), ...(pm.inbox||[]), ...(pm.archive||[])].forEach(t => {
      const info = taskInfo[t.id] || {};
      allTasks.push({ ...t, node: 'prime', ...info });
    });

    allTasks.sort((a, b) => b.id.localeCompare(a.id));
    allTasks.forEach(addTask);
  } catch(e) {
    document.getElementById('task-list').innerHTML = `<div class="error-msg">加载失败: ${e.message}</div>`;
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('update-time').textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
}

// 每30秒自动刷新
loadAll();
setInterval(loadAll, REFRESH_MS);
</script>
</body>
</html>
